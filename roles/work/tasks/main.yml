# Ansible role to configure all related to work
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Add Homebrew taps for work tooling
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ BREW_PACKAGES.taps | default([]) }}"

- name: Install work formulas
  community.general.homebrew:
    name: "{{ BREW_PACKAGES.formulas | default([]) }}"
    state: present
  when: BREW_PACKAGES.formulas | default([]) | length > 0

- name: Install work casks
  community.general.homebrew_cask:
    name: "{{ BREW_PACKAGES.casks | default([]) }}"
    state: present
  when: BREW_PACKAGES.casks | default([]) | length > 0

- name: Symlink Jira television cable
  ansible.builtin.file:
    src: "{{ role_path }}/files/television/cable/jira.toml"
    dest: "{{ HOME }}/.config/television/cable/jira.toml"
    state: link
    force: true

- name: Symlink Jira helper fish function
  ansible.builtin.file:
    src: "{{ role_path }}/files/fish/functions/_tv_jira.fish"
    dest: "{{ HOME }}/.config/fish/functions/_tv_jira.fish"
    state: link
    force: true

- name: Render work secrets file from vault
  ansible.builtin.template:
    src: exports.fish.j2
    dest: "{{ HOME }}/.config/fish/conf.d/work-secrets.fish"
    mode: "0600"

- name: Ensure scripts directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/fish/conf.d/scripts"
    state: directory
    mode: '0755'

- name: Link all scripts to config directory
  ansible.builtin.file:
    src: "{{ role_path }}/files/scripts/{{ item | basename }}"
    dest: "{{ HOME }}/.local/bin/{{ item | basename }}"
    state: link
    force: true
  with_fileglob:
    - "{{ role_path }}/files/scripts/*"

- name: Ensure glab-cli config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/Library/Application Support/glab-cli"
    state: directory
    mode: "0755"

- name: Render glab config with personal + work hosts
  ansible.builtin.template:
    src: glab/config.yml.j2
    dest: "{{ HOME }}/Library/Application Support/glab-cli/config.yml"
    mode: "0600"
    force: true

- name: Verify glab is authenticated for each gitlab host
  ansible.builtin.command: glab auth status --hostname {{ item }}
  environment:
    GLAB_TOKEN: ""
    GITLAB_TOKEN: ""
    GITLAB_ACCESS_TOKEN: ""
    OAUTH_TOKEN: ""
  loop:
    - gitlab.com
    - gitlab.com-work
  register: glab_auth_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Fail loudly if any glab host is not authenticated
  ansible.builtin.fail:
    msg: |
      glab is not authenticated for one or more configured hosts.

      For each host that's missing, from a normal terminal:
        1. Create a GitLab personal access token at
           https://gitlab.com/-/user_settings/personal_access_tokens
           Use the matching GitLab account (personal or work) when creating it.
        2. Run, replacing <HOST> with the host that needs auth:
             glab auth login --hostname <HOST> --git-protocol ssh --use-keyring
           Paste the PAT when prompted.

      For gitlab.com-work, when glab asks for the API host, answer gitlab.com.

      The tokens are stored in the macOS keychain — this repo keeps no
      GitLab credentials on disk.

      Then re-run the playbook.
  when: glab_auth_check.results | selectattr('rc', 'ne', 0) | list | length > 0

# SSH keys (work and personal) are deployed by the `ssh` role from
# SSH_KEYS + SSH_KEYS_EXTRA. host_vars/work.yml supplies the work key.
