# Ansible role to configure all related to shell
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Install packages related to the shell
  community.general.pacman:
    name: "{{ item }}"
    state: present
    executable: yay
    extra_args: --noconfirm
  loop: "{{ TERMINAL_APPS }}"

- name: Make fish as our default shell
  become: true
  user:
    name: "{{ USER }}"
    shell: /usr/bin/fish
    state: present

- name: Install fish plugins
  ansible.builtin.shell: "fisher install {{ item }}"
  args:
    executable: /usr/bin/fish
  loop: "{{ FISH_PLUGINS }}"

- name: Creating backup directory for fish
  ansible.builtin.file:
    path: backups/.config/fish/conf.d
    state: directory
    recurse: true

- name: Backup fish settings
  ansible.builtin.copy:
    src: "{{ HOME }}/{{ item.file }}"
    dest: "{{ CURRENT_DIR }}/backups/{{ item.file }}"
  when: "'{{ HOME }}/{{ item.file }}' is exists"
  with_items:
    - { file: .config/fish/fish_plugins }
    - { file: .config/fish/config.fish }
    - { file: .config/fish/conf.d/aliases.fish }
    - { file: .config/fish/conf.d/exports.fish }

- name: Configuring fish
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.file }}"
    dest: "{{ HOME }}/.config/{{ item.file }}"
    state: link
    force: true
  with_items:
    - { file: fish/config.fish }
    - { file: fish/conf.d/aliases.fish }
    - { file: fish/conf.d/exports.fish }

- name: Generating exports with secrets
  ansible.builtin.template:
    src: secrets.fish.j2
    dest: "{{ HOME }}/.config/fish/conf.d/secrets.yml"