# Ansible role to configure all related to shell
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Install shell formulas
  community.general.homebrew:
    name: "{{ BREW_PACKAGES.formulas | default([]) }}"
    state: present
  when: BREW_PACKAGES.formulas | default([]) | length > 0

- name: Install shell casks
  community.general.homebrew_cask:
    name: "{{ BREW_PACKAGES.casks | default([]) }}"
    state: present
  when: BREW_PACKAGES.casks | default([]) | length > 0

- name: Add fish as a known shell
  become: true
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ FISH_PATH }}"
    state: present

- name: Make fish as our default shell
  become: true
  ansible.builtin.user:
    name: "{{ USER }}"
    shell: "{{ FISH_PATH }}"
    state: present

- name: Install fish plugins
  ansible.builtin.shell: "fisher install {{ item }}"
  args:
    executable: "{{ FISH_PATH }}"
  loop: "{{ FISH_PLUGINS }}"
  register: fisher_result
  changed_when: "'Installing' in fisher_result.stdout or 'Updating' in fisher_result.stdout"

- name: Ensure shell config directories exist
  ansible.builtin.file:
    path: "{{ HOME }}/{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - .config/fish
    - .config/ghostty

- name: Ensure backup directories exist
  ansible.builtin.file:
    path: "{{ CURRENT_DIR }}/backups/{{ item }}"
    state: directory
    recurse: true
  with_items:
    - .config/fish/conf.d
    - .config/fish/functions
    - .config/fish/completions
    - .config/ghostty

- name: Check if files to backup exists
  ansible.builtin.stat:
    path: "{{ HOME }}/{{ item }}"
  with_items:
    - .config/ghostty/config
    - .config/fish/config.fish
    - .config/fish/conf.d/aliases.fish
    - .config/fish/conf.d/exports.fish
    - .config/fish/functions/clean_docker.fish
    - .config/fish/functions/clean_node.fish
    - .config/fish/functions/create_gitconfig.fish
    - .config/fish/functions/claude-skill.fish
    - .config/fish/functions/claude-mcp.fish
    - .config/fish/functions/claude-agent.fish
    - .config/starship.toml
  register: results

- name: Backup fish settings
  ansible.builtin.copy:
    src: "{{ item.stat.path }}"
    dest: "{{ CURRENT_DIR }}/backups/{{ item.item }}"
    mode: "0644"
  when: item.stat.exists
  with_items: "{{ results.results }}"

- name: Symlink Ghostty config
  ansible.builtin.file:
    src: "{{ role_path }}/files/ghostty/config"
    dest: "{{ HOME }}/.config/ghostty/config"
    state: link
    force: true

- name: Symlink fish config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/.config/{{ item }}"
    state: link
    force: true
  with_items:
    - fish/config.fish
    - fish/conf.d/aliases.fish
    - fish/conf.d/exports.fish
    - fish/functions/clean_docker.fish
    - fish/functions/clean_node.fish
    - fish/functions/create_gitconfig.fish
    - fish/functions/claude-skill.fish
    - fish/functions/claude-mcp.fish
    - fish/functions/claude-agent.fish

- name: Symlink starship config
  ansible.builtin.file:
    src: "{{ role_path }}/files/starship.toml"
    dest: "{{ HOME }}/.config/starship.toml"
    state: link
    force: true

- name: Render fish secrets file from vault
  ansible.builtin.template:
    src: secrets.fish.j2
    dest: "{{ HOME }}/.config/fish/conf.d/secrets.fish"
    mode: "0600"
