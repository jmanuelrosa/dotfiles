# Ansible defaults for the shell role
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)

---

FISH_PATH: /opt/homebrew/bin/fish

FISH_PLUGINS:
  - danhper/fish-ssh-agent
  - franciscolourenco/done
  - jorgebucaran/autopair.fish
  - jorgebucaran/replay.fish
  - nickeb96/puffer-fish

BREW_PACKAGES:
  formulas:
    - fish
    - fisher
    - starship
    - gnupg
  casks:
    - ghostty

# Upstream television cables to keep after `tv update-channels`.
# Any non-symlink .toml in ~/.config/television/cable/ whose basename
# (minus .toml) is not in this list gets pruned each run. Symlinks
# (i.e. cables vendored in roles/shell/files/television/cable/) are
# always preserved regardless of this list.
TV_CABLE_ALLOWLIST:
  - brew-packages
  - dirs
  - files
  - fish-history
  - git-worktrees
