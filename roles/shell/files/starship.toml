"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 200

# Theme
format = """
$directory\
$nodejs\
$custom\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[sudo]
style = 'bold yellow'
symbol = '🧙'
disabled = false

[aws]
disabled = true

[cmd_duration]
disabled = false

[directory]
style = "bold cyan"
truncate_to_repo = false
truncation_length = 0

[docker_context]
disabled = true

[gcloud]
disabled = true

[git_branch]
symbol = " "
format = "[$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_metrics]
disabled = false

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[line_break]
disabled = false

[mise]
disabled = true

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[custom.pnpm]
detect_files = ["pnpm-lock.yaml"]
symbol = "\U000f0ab5 "
command = "echo pnpm"
format = "[$symbol($output )]($style)"
style = "bold #f9f1e1"

[custom.bun]
detect_files = ["bun.lockb", "bun.lock"]
symbol = "🥟 "
command = "echo bun"
format = "[$symbol($output )]($style)"
style = "bold #f9f1e1"

[custom.npm]
detect_files = ["package-lock.json"]
symbol = " "
command = "echo npm"
format = "[$symbol($output )]($style)"
style = "bold #f9f1e1"

[custom.yarn]
detect_files = ["yarn.lock"]
symbol = " "
command = "echo yarn"
format = "[$symbol($output )]($style)"
style = "bold #f9f1e1"

