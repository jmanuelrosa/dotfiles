[metadata]
name = "claude-agents"
description = "Manage Claude Code agents (toggle link, check outdated, update)"
requirements = ["fish", "jq", "bat"]

[source]
command = [
  { name = "All",       run = "fish -c '_tv_claude_list agent'" },
  { name = "Linked",    run = "fish -c '_tv_claude_list agent linked'" },
  { name = "Available", run = "fish -c '_tv_claude_list agent available'" },
  { name = "No global", run = "fish -c '_tv_claude_list agent noglobal'" },
]
output = "{split: :0}"

[preview]
command = "fish -c 'set b $DOTFILES_DIR/roles/ai/files/claude; set p $b/agents/{split: :0}.md; test -f $p; or set p $b/plugins/{split: :0}/agents/{split: :0}-staff-engineer.md; test -f $p; and bat --color=always --plain --language=markdown $p; or echo \"Not downloaded: press Enter to install via claude-agent add\"'"

[ui]
layout = "portrait"

[keybindings]
enter = "actions:toggle"
ctrl-d = "actions:outdated"
ctrl-u = "actions:update"
ctrl-o = "actions:edit"

[actions.toggle]
description = "Toggle the agent link in this project"
command = "fish -c '_tv_claude_toggle agent {split: :0}'"
mode = "execute"
separator = " "

[actions.outdated]
description = "Check if the agent is up-to-date"
command = "claude-agent outdated {split: :0}"
mode = "execute"
separator = " "

[actions.update]
description = "Sync the agent from upstream"
command = "claude-agent update {split: :0}"
mode = "execute"
separator = " "

[actions.edit]
description = "Open agent .md in $EDITOR"
command = "fish -c 'set b $DOTFILES_DIR/roles/ai/files/claude; set p $b/agents/{split: :0}.md; test -f $p; or set p $b/plugins/{split: :0}/agents/{split: :0}-staff-engineer.md; $EDITOR $p'"
mode = "execute"
