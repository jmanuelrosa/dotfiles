# Ansible role to deploy SSH keys.
# Driven by SSH_KEYS (group_vars/all.yml) + SSH_KEYS_EXTRA (host_vars/<profile>.yml).
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Ensure ~/.ssh exists
  ansible.builtin.file:
    path: "{{ HOME }}/.ssh"
    state: directory
    mode: "0700"

- name: Install SSH private keys
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ HOME }}/.ssh/{{ item.name }}"
    owner: "{{ USER }}"
    mode: "0600"
  loop: "{{ SSH_KEYS + SSH_KEYS_EXTRA }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Install SSH public keys
  ansible.builtin.copy:
    content: "{{ item.public }}"
    dest: "{{ HOME }}/.ssh/{{ item.name }}.pub"
    owner: "{{ USER }}"
    mode: "0644"
  loop: "{{ SSH_KEYS + SSH_KEYS_EXTRA }}"
  loop_control:
    label: "{{ item.name }}"
