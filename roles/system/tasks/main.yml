# Ansible role to install all packages related to arch system
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Update all packages and mirrors with pacman
  become: true
  become_method: sudo
  become_user: root
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Install Git package
  become: true
  become_method: sudo
  become_user: root
  community.general.pacman:
    name: git
    state: present
    reason: explicit
    reason_for: all

- name: Downloading YAY
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: "{{ HOME }}/yay"

- name: Install AUR helper yay
  ansible.builtin.shell: |
    cd "{{ HOME }}/yay"
    makepkg -si --noconfirm
  register: result
  changed_when:
    - result.failed

- name: Remove YAY cache source dir
  ansible.builtin.file:
    path: "{{ HOME }}/yay"
    state: absent

- name: Update all packages and mirrors with yay
  ansible.builtin.shell: yay -Sy
  register: result
  ignore_errors: true
  changed_when:
    - result.failed

- name: Install all packages related to the system
  ansible.builtin.shell: yay --quiet --sync --noconfirm --removemake {{ item }}
  loop: "{{ SYSTEM_APPS }}"
  register: result
  ignore_errors: true
  changed_when:
    - result.failed

- name: Creating user config directory
  ansible.builtin.file:
    path: "{{ HOME }}/.config"
    state: directory

- name: Enabling tlp as a service with systemd
  systemd:
    name: tlp
    enabled: true
    daemon_reload: true
  become: true