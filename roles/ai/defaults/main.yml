# Ansible defaults for the ai role
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

# GLOBAL_CLAUDE_SKILLS and GLOBAL_CLAUDE_AGENTS (the sets symlinked into
# ~/.claude so they are available in every project without a per-project
# `claude-skill`/`claude-agent add`) are not hardcoded here: the ai role
# derives them from the `global` group tag in skill-registry.json and
# agent-registry.json, which is the single source of truth. Tag an entry
# `"global"` to add it to the set; see tasks/main.yml.

BREW_PACKAGES:
  taps:
    - steipete/tap
  trusted:
    - steipete/tap
  formulas:
    - gemini-cli
    - pi-coding-agent
    - rtk
    # Runs the bundled Claude skill validators (e.g. skill-writer's
    # `uv run quick_validate.py`), which declare inline script dependencies.
    - uv
  casks:
    - chatgpt
    - claude
    - claude-code@latest
    - cursor
    - steipete/tap/codexbar
