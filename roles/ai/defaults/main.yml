# Ansible defaults for the ai role
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

# Skills symlinked into ~/.claude/skills/ so they are available to Claude Code
# in every project (no per-project `claude-skill add` needed).
GLOBAL_CLAUDE_SKILLS:
  - skill-writer
  - skill-scout
  - cc-review
  - agent-audit
  - grill-me
  - grill-with-docs
  - commit
  - pr
  - humanizer

# Agents symlinked into ~/.claude/agents/ so they are available to Claude Code
# in every project (no per-project `claude-agent add` needed).
GLOBAL_CLAUDE_AGENTS:
  - cc-staff-reviewer
  - architect

BREW_PACKAGES:
  taps:
    - steipete/tap
  trusted:
    - steipete/tap
  formulas:
    - gemini-cli
    - pi-coding-agent
    # Runs the bundled Claude skill validators (e.g. skill-writer's
    # `uv run quick_validate.py`), which declare inline script dependencies.
    - uv
  casks:
    - chatgpt
    - claude
    - claude-code@latest
    - cursor
    - steipete/tap/codexbar
