# Ansible role to install and configure AI tools
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Load AI variables
  ansible.builtin.include_vars: vars/main.yml

- name: Install AI formulas
  community.general.homebrew:
    name: "{{ AI_FORMULAS }}"
    state: present

- name: Install AI casks
  community.general.homebrew_cask:
    name: "{{ AI_CASKS }}"
    state: present

- name: Creating gemini config directory
  ansible.builtin.file:
    path: "{{ HOME }}/.gemini"
    state: directory
    mode: "0755"

- name: Configuring gemini
  ansible.builtin.file:
    src: "{{ role_path }}/files/gemini/settings.json"
    dest: "{{ HOME }}/.gemini/settings.json"
    state: link
    force: true

- name: Configuring claude
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/settings.json"
    dest: "{{ HOME }}/.claude/settings.json"
    state: link
    force: true

- name: Install AI npm packages
  ansible.builtin.command: "bun install -g {{ item }}"
  loop: "{{ AI_NPM_PACKAGES }}"
  changed_when: false

- name: Pulling Ollama models
  ansible.builtin.command: "ollama pull {{ item }}"
  loop: "{{ OLLAMA_MODELS }}"
  changed_when: false

- name: Creating pi agent config directory
  ansible.builtin.file:
    path: "{{ HOME }}/.pi/agent"
    state: directory
    mode: "0755"

- name: Configuring pi settings
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/settings.json"
    dest: "{{ HOME }}/.pi/agent/settings.json"
    state: link
    force: true

- name: Configuring pi models
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/models.json"
    dest: "{{ HOME }}/.pi/agent/models.json"
    state: link
    force: true

- name: Configuring pi system prompt
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/SYSTEM.md"
    dest: "{{ HOME }}/.pi/agent/SYSTEM.md"
    state: link
    force: true

- name: Sharing claude skills with pi
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/skills"
    dest: "{{ HOME }}/.pi/agent/skills"
    state: link
    force: true
