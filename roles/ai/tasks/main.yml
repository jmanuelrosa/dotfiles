# Ansible role to install and configure AI tools
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Add Homebrew taps for AI tooling
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ BREW_PACKAGES.taps | default([]) }}"

- name: Trust non-official Homebrew taps for AI tooling
  ansible.builtin.command:
    cmd: "{{ lookup('pipe', 'which brew') }} trust {{ item }}"
  loop: "{{ BREW_PACKAGES.trusted | default([]) }}"
  register: brew_trust
  changed_when: brew_trust.stdout is search('^Trusted ')

- name: Install AI formulas
  community.general.homebrew:
    name: "{{ BREW_PACKAGES.formulas | default([]) }}"
    state: present
  when: BREW_PACKAGES.formulas | default([]) | length > 0

- name: Install AI casks
  community.general.homebrew_cask:
    name: "{{ BREW_PACKAGES.casks | default([]) }}"
    state: present
  when: BREW_PACKAGES.casks | default([]) | length > 0

- name: Ensure gemini config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.gemini"
    state: directory
    mode: "0755"

- name: Symlink gemini config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gemini/settings.json"
    dest: "{{ HOME }}/.gemini/settings.json"
    state: link
    force: true

- name: Symlink claude config
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/settings.json"
    dest: "{{ HOME }}/.claude/settings.json"
    state: link
    force: true

- name: Symlink global claude instructions
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/CLAUDE.md"
    dest: "{{ HOME }}/.claude/CLAUDE.md"
    state: link
    force: true

- name: Ensure claude hooks directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.claude/hooks"
    state: directory
    mode: "0755"

- name: Symlink claude git-skill-gate hook
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/hooks/git-skill-gate.sh"
    dest: "{{ HOME }}/.claude/hooks/git-skill-gate.sh"
    state: link
    force: true

- name: Symlink claude skill-recap hook
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/hooks/skill-recap.sh"
    dest: "{{ HOME }}/.claude/hooks/skill-recap.sh"
    state: link
    force: true

- name: Symlink claude pre-commit-verify hook
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/hooks/pre-commit-verify.sh"
    dest: "{{ HOME }}/.claude/hooks/pre-commit-verify.sh"
    state: link
    force: true

- name: Symlink claude em-dash-gate hook
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/hooks/em-dash-gate.sh"
    dest: "{{ HOME }}/.claude/hooks/em-dash-gate.sh"
    state: link
    force: true

- name: Symlink claude cloud-readonly-gate hook
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/hooks/cloud-readonly-gate.sh"
    dest: "{{ HOME }}/.claude/hooks/cloud-readonly-gate.sh"
    state: link
    force: true

- name: Symlink claude status line script
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/statusline.sh"
    dest: "{{ HOME }}/.claude/statusline.sh"
    state: link
    force: true

- name: Ensure global claude skills directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.claude/skills"
    state: directory
    mode: "0755"

- name: Read claude skill registry
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/claude/skill-registry.json"
  register: _claude_skill_registry_raw

- name: Read claude agent registry
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/claude/agent-registry.json"
  register: _claude_agent_registry_raw

# The registry no longer stores a `name` for repos skills; derive each one's directory
# name from upstream_path (basename, or repo name for root skills) so the dependency
# filter below can still match by name. local_skills keep their explicit `name`.
- name: Derive repos skill names from upstream_path
  ansible.builtin.set_fact:
    _named_repo_skills: >-
      {{ _named_repo_skills | default([])
         + [item | combine({'name': (item.upstream_path | default('') | regex_replace('^.*/', ''))})] }}
  loop: >-
    {{ (_claude_skill_registry_raw.content | b64decode | from_json).repos.values()
       | map(attribute='skills') | flatten }}
  loop_control:
    label: "{{ item.upstream_path | default('?') }}"

# Global agents may declare skill dependencies in agent-registry.json; treat
# those skills as extra roots so a global agent (e.g. architect) never ships
# without the method skills it invokes.
- name: Collect skill dependencies of global agents
  ansible.builtin.set_fact:
    _global_agent_skill_deps: >-
      {{ (
            ((_claude_agent_registry_raw.content | b64decode | from_json).local_agents | default([]))
            + ((_claude_agent_registry_raw.content | b64decode | from_json).repos.values()
               | map(attribute='agents') | flatten)
         )
         | selectattr('name', 'in', GLOBAL_CLAUDE_AGENTS | default([]))
         | selectattr('dependencies', 'defined')
         | map(attribute='dependencies') | flatten | unique }}

# Expand the global skill list with each skill's registry-declared dependencies
# so a dispatcher skill (e.g. grill-me -> grilling) never ships without the
# skills it invokes. One level of expansion over the combined roots
# (GLOBAL_CLAUDE_SKILLS + global agents' skill deps); deps must themselves
# be registered.
- name: Build effective global skills (with declared skill and agent dependencies)
  ansible.builtin.set_fact:
    GLOBAL_CLAUDE_SKILLS_EFFECTIVE: >-
      {{ (
            (GLOBAL_CLAUDE_SKILLS | default([]))
            + (_global_agent_skill_deps | default([]))
            + (
                (
                  (_named_repo_skills | default([]))
                  + ((_claude_skill_registry_raw.content | b64decode | from_json).local_skills | default([]))
                )
                | selectattr('name', 'in', (GLOBAL_CLAUDE_SKILLS | default([])) + (_global_agent_skill_deps | default([])))
                | selectattr('dependencies', 'defined')
                | map(attribute='dependencies') | flatten
              )
         ) | unique }}

# A registry typo would otherwise become a dangling symlink (file state=link
# force=true never validates its target).
- name: Stat every effective global skill on disk
  ansible.builtin.stat:
    path: "{{ role_path }}/files/claude/skills/{{ item }}"
  register: _eff_skill_stat
  loop: "{{ GLOBAL_CLAUDE_SKILLS_EFFECTIVE | default([]) }}"

- name: Fail loudly if a declared global skill is missing on disk
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    fail_msg: >-
      Skill '{{ item.item }}' is required globally (in GLOBAL_CLAUDE_SKILLS or
      declared as a dependency by a global skill/agent) but is not present under
      roles/ai/files/claude/skills/. Fix the registry name or run
      'claude-skill update {{ item.item }}'.
  loop: "{{ _eff_skill_stat.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Symlink selected skills into global claude skills dir
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/skills/{{ item }}"
    dest: "{{ HOME }}/.claude/skills/{{ item }}"
    state: link
    force: true
  loop: "{{ GLOBAL_CLAUDE_SKILLS_EFFECTIVE | default([]) }}"

- name: Ensure global claude agents directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.claude/agents"
    state: directory
    mode: "0755"

- name: Symlink selected agents into global claude agents dir
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/agents/{{ item }}.md"
    dest: "{{ HOME }}/.claude/agents/{{ item }}.md"
    state: link
    force: true
  loop: "{{ GLOBAL_CLAUDE_AGENTS | default([]) }}"

- name: Ensure pi agent config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.pi/agent"
    state: directory
    mode: "0755"

- name: Symlink pi settings
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/settings.json"
    dest: "{{ HOME }}/.pi/agent/settings.json"
    state: link
    force: true

- name: Symlink pi models
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/models.json"
    dest: "{{ HOME }}/.pi/agent/models.json"
    state: link
    force: true

- name: Symlink pi system prompt
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/SYSTEM.md"
    dest: "{{ HOME }}/.pi/agent/SYSTEM.md"
    state: link
    force: true

- name: Symlink claude skills into pi agent
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/skills"
    dest: "{{ HOME }}/.pi/agent/skills"
    state: link
    force: true

# rtk ignores XDG_CONFIG_HOME and only reads the macOS Application Support path.
- name: Ensure rtk config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/Library/Application Support/rtk"
    state: directory
    mode: "0755"

- name: Symlink rtk config
  ansible.builtin.file:
    src: "{{ role_path }}/files/rtk/config.toml"
    dest: "{{ HOME }}/Library/Application Support/rtk/config.toml"
    state: link
    force: true
