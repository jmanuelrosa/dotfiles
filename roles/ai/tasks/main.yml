# Ansible role to install and configure AI tools
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Add Homebrew taps for AI tooling
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ BREW_PACKAGES.taps | default([]) }}"

- name: Install AI formulas
  community.general.homebrew:
    name: "{{ BREW_PACKAGES.formulas | default([]) }}"
    state: present
  when: BREW_PACKAGES.formulas | default([]) | length > 0

- name: Install AI casks
  community.general.homebrew_cask:
    name: "{{ BREW_PACKAGES.casks | default([]) }}"
    state: present
  when: BREW_PACKAGES.casks | default([]) | length > 0

- name: Ensure gemini config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.gemini"
    state: directory
    mode: "0755"

- name: Symlink gemini config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gemini/settings.json"
    dest: "{{ HOME }}/.gemini/settings.json"
    state: link
    force: true

- name: Symlink claude config
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/settings.json"
    dest: "{{ HOME }}/.claude/settings.json"
    state: link
    force: true

- name: Ensure pi agent config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.pi/agent"
    state: directory
    mode: "0755"

- name: Symlink pi settings
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/settings.json"
    dest: "{{ HOME }}/.pi/agent/settings.json"
    state: link
    force: true

- name: Symlink pi models
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/models.json"
    dest: "{{ HOME }}/.pi/agent/models.json"
    state: link
    force: true

- name: Symlink pi system prompt
  ansible.builtin.file:
    src: "{{ role_path }}/files/pi/SYSTEM.md"
    dest: "{{ HOME }}/.pi/agent/SYSTEM.md"
    state: link
    force: true

- name: Symlink claude skills into pi agent
  ansible.builtin.file:
    src: "{{ role_path }}/files/claude/skills"
    dest: "{{ HOME }}/.pi/agent/skills"
    state: link
    force: true

- name: Ensure ollama serve is not running (free memory, run on-demand only)
  ansible.builtin.command: pkill -x ollama
  register: ollama_kill
  changed_when: ollama_kill.rc == 0
  failed_when: ollama_kill.rc not in [0, 1]
