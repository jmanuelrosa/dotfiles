# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# See: https://nikitabobko.github.io/AeroSpace/guide#config-version
# Fallback value (if you omit the key): config-version = 1qq
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# Start AeroSpace at login
start-at-login = true

# Automatically reload the config when the config file is saved
# After setting this to true, reload once manually to start the auto-reloading
auto-reload-config = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 10

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config option is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "AI", "Browsers", "Database",
                         "Editors", "Git", "Music", "Notion", "Personal", "Rest",
                         "Slack", "Terminal", "Vault", "Whatsapp", "TradingView"
                        ]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

focus-follows-mouse.enabled = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
gaps.inner.horizontal = 0
gaps.inner.vertical =   0
gaps.outer.left =       0
gaps.outer.bottom =     0
gaps.outer.top =        0
gaps.outer.right =      0

[workspace-to-monitor-force-assignment]
    # Secondary - Asus Screen
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'MB16AHV'
    5 = 'MB16AHV'
    6 = '3'
    7 = '3'
    8 = '3'
    9 = '3'
    AI = 'secondary'
    Browsers = 'secondary'
    Database = 'secondary'
    Editors = ['dell.*', 'main']
    Git = 'secondary'
    Music = 'secondary'
    Notion = 'main'
    Personal = 'main'
    Slack = ['secondary', 'main']
    Rest = 'secondary'
    Terminal = 'secondary'
    TradingView = 'secondary'
    Whatsapp = ['secondary', 'main']

    # 'main' binding mode declaration
    # See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
    # 'main' binding mode must be always presented
    # Fallback value (if you omit the key): mode.main.binding = {}

[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e \
    # 'tell application "Terminal" to tell (do script) to activate' '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout

    alt-enter = 'exec-and-forget open /Applications/Ghostty.app'
    cmd-ctrl-alt-b = 'exec-and-forget open -a "Google Chrome"'
    cmd-ctrl-alt-h = 'exec-and-forget open -a Helium'
    cmd-ctrl-alt-s = 'exec-and-forget open -a Slack'

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-shift-space = 'layout floating tiling'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-j = 'focus left'
    alt-k = 'focus down'
    alt-i = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-j = 'move left'
    alt-shift-k = 'move down'
    alt-shift-i = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-shift-minus = 'resize smart -50'
    alt-shift-equal = 'resize smart +50'

    alt-shift-f = 'fullscreen'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-a = 'workspace AI'
    alt-b = 'workspace Browsers'
    alt-d = 'workspace Database'
    alt-e = 'workspace Editors'
    alt-g = 'workspace Git'
    alt-m = 'workspace Music'
    alt-o = 'workspace Notion'
    alt-p = 'workspace Personal'
    alt-r = 'workspace Rest'
    alt-s = 'workspace Slack'
    alt-t = 'workspace Terminal'
    alt-v = 'workspace Vault'
    alt-w = 'workspace Whatsapp'
    alt-z = 'workspace TradingView'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace AI'
    alt-shift-b = 'move-node-to-workspace Browsers'
    alt-shift-d = 'move-node-to-workspace Database'
    alt-shift-e = 'move-node-to-workspace Editors'
    alt-shift-g = 'move-node-to-workspace Git'
    alt-shift-m = 'move-node-to-workspace Music'
    alt-shift-o = 'move-node-to-workspace Notion'
    alt-shift-p = 'move-node-to-workspace Personal'
    alt-shift-r = 'move-node-to-workspace Rest'
    alt-shift-s = 'move-node-to-workspace Slack'
    alt-shift-t = 'move-node-to-workspace Terminal'
    alt-shift-v = 'move-node-to-workspace Vault'
    alt-shift-w = 'move-node-to-workspace Whatsapp'
    alt-shift-z = 'move-node-to-workspace TradingView'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-j = ['join-with left', 'mode main']
    alt-shift-k = ['join-with down', 'mode main']
    alt-shift-i = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
    if.app-id="com.mitchellh.ghostty"
    run= ["layout tiling", 'move-node-to-workspace Terminal']

[[on-window-detected]]
    if.app-id="com.tinyspeck.slackmacgap"
    run= ["layout tiling", 'move-node-to-workspace Slack']

[[on-window-detected]]
    if.app-id="com.google.Chrome"
    run= ["layout tiling", 'move-node-to-workspace Browsers']

[[on-window-detected]]
    if.app-id="net.imput.helium"
    run= ["layout tiling", 'move-node-to-workspace Browsers']

[[on-window-detected]]
    if.app-id = 'app.zen-browser.zen'
    run= ["layout tiling", 'move-node-to-workspace Browsers']

[[on-window-detected]]
    if.app-id="com.microsoft.VSCode"
    run= ["layout tiling", 'move-node-to-workspace Editors']

[[on-window-detected]]
    if.app-id="com.usebruno.app"
    run= ["layout tiling", 'move-node-to-workspace Rest']

[[on-window-detected]]
    if.app-id = 'com.spotify.client'
    run= ["layout tiling", 'move-node-to-workspace Music']

[[on-window-detected]]
    if.app-id = 'notion.id'
    run= ["layout tiling", 'move-node-to-workspace Notion']

[[on-window-detected]]
    if.app-id = 'md.obsidian'
    run= ["layout tiling", 'move-node-to-workspace Notion']

[[on-window-detected]]
    if.app-id = 'com.openai.chat'
    run= ["layout tiling", 'move-node-to-workspace AI']

[[on-window-detected]]
    if.app-id = 'com.anthropic.claudefordesktop'
    run= ["layout tiling", 'move-node-to-workspace AI']

[[on-window-detected]]
    if.app-id = 'org.jkiss.dbeaver.core.product'
    run= ["layout tiling", 'move-node-to-workspace Database']

[[on-window-detected]]
    if.app-id = 'net.whatsapp.WhatsApp'
    run= ["layout tiling", 'move-node-to-workspace Whatsapp']

[[on-window-detected]]
    if.app-id = 'com.tradingview.tradingviewapp.desktop'
    run= ["layout tiling", 'move-node-to-workspace TradingView']

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run= ["layout floating", 'move-node-to-workspace Vault']
