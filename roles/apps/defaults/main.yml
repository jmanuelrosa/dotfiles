# Ansible defaults for the apps role
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
#
# Versions are intentionally NOT pinned for VSCODE_EXTENSIONS — VSCode's
# built-in extension auto-update runs in the background regardless of what
# the playbook installed, so pinning at install time is bypassed within hours.
---

VSCODE_EXTENSIONS:
  - biomejs.biome
  - EditorConfig.EditorConfig
  - usernamehw.errorlens
  - GitHub.github-vscode-theme
  - YoavBls.pretty-ts-errors
  - astro-build.astro-vscode
  - Anthropic.claude-code
  - Prisma.prisma
  - bradlc.vscode-tailwindcss

BREW_PACKAGES:
  taps:
    - oven-sh/bun
    - getsentry/tools
    - tw93/tap
    - nikitabobko/tap
  formulas:
    # Development
    - bruno-cli
    - git
    - git-delta
    - lazygit
    - gh
    - glab
    - fnm
    - oven-sh/bun/bun
    - getsentry/tools/sentry
    # Databases
    - libpq
    - pgcli
    # Infrastructure
    - awscli
    - colima
    - ctop
    - docker
    - docker-compose
    - docker-buildx
    - docker-credential-helper
    # Multimedia
    - mpv
    # System / window management
    - tw93/tap/mole
  casks:
    # Browsers
    - google-chrome
    - zen
    - brave-browser
    - helium-browser
    # Communication
    - slack
    - discord
    - whatsapp
    # Databases
    - dbeaver-community
    # Development
    - bruno
    # Editors
    - visual-studio-code
    # Infrastructure
    - gcloud-cli
    # Multimedia
    - blackhole-16ch
    - spotify
    - vlc
    # System / window management
    - maccy
    - nikitabobko/tap/aerospace
    - font-fira-code-nerd-font
    - logi-options+
    # Other
    - bitwarden
    - figma
    - notion
    - sf-symbols
    - tradingview
