# Ansible role to install and configure all editors apps
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Ensure VSCode User directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/Library/Application Support/Code/User"
    state: directory
    mode: "0755"

- name: Symlink VSCode settings and keybindings
  ansible.builtin.file:
    src: "{{ role_path }}/files/vscode/{{ item }}"
    dest: "{{ HOME }}/Library/Application Support/Code/User/{{ item }}"
    state: link
    force: true
  with_items:
    - settings.json
    - keybindings.json

- name: List installed VSCode extensions
  ansible.builtin.command: code --list-extensions
  register: vscode_installed
  changed_when: false

- name: Install VSCode extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  loop: "{{ VSCODE_EXTENSIONS }}"
  when: item not in vscode_installed.stdout_lines
  changed_when: true
