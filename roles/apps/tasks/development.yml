# Ansible role to install and configure all development apps
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Symlink git config and ignore
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/{{ item }}"
    state: link
    force: true
  with_items:
    - .gitconfig
    - .gitignore

- name: Symlink lazygit config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/Library/Application Support/{{ item }}"
    state: link
    force: true
  with_items:
    - lazygit/config.yml

- name: Symlink npmrc
  ansible.builtin.file:
    src: "{{ role_path }}/files/.npmrc"
    dest: "{{ HOME }}/.npmrc"
    state: link
    force: true

- name: Symlink gh (GitHub CLI) config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gh/config.yml"
    dest: "{{ HOME }}/.config/gh/config.yml"
    state: link
    force: true

- name: Ensure pgcli config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/pgcli"
    state: directory
    mode: "0755"

- name: Symlink pgcli config
  ansible.builtin.file:
    src: "{{ role_path }}/files/pgcli/config"
    dest: "{{ HOME }}/.config/pgcli/config"
    state: link
    force: true
