# Ansible role to install and configure all development apps
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Symlink git config and ignore
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/{{ item }}"
    state: link
    force: true
  with_items:
    - .gitconfig
    - .gitignore

- name: Symlink lazygit config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/Library/Application Support/{{ item }}"
    state: link
    force: true
  with_items:
    - lazygit/config.yml

- name: Symlink npmrc
  ansible.builtin.file:
    src: "{{ role_path }}/files/.npmrc"
    dest: "{{ HOME }}/.npmrc"
    state: link
    force: true

- name: Symlink gh (GitHub CLI) config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gh/config.yml"
    dest: "{{ HOME }}/.config/gh/config.yml"
    state: link
    force: true

- name: Read currently stored gh token (if any)
  ansible.builtin.slurp:
    src: "{{ HOME }}/.config/gh/hosts.yml"
  register: gh_hosts_raw
  failed_when: false
  no_log: true

- name: Extract stored github.com oauth token
  ansible.builtin.set_fact:
    gh_stored_token: >-
      {{ (gh_hosts_raw.content | b64decode | from_yaml).get('github.com', {}).get('oauth_token', '')
         if gh_hosts_raw.content is defined else '' }}
  no_log: true

- name: Authenticate gh CLI when stored token differs from vault
  ansible.builtin.command: gh auth login --hostname github.com --git-protocol ssh --with-token
  args:
    stdin: "{{ GH_TOKEN }}"
  when: gh_stored_token != GH_TOKEN
  no_log: true
  register: gh_auth_login
  changed_when: gh_auth_login.rc == 0

- name: Verify gh authentication is currently valid
  ansible.builtin.command: gh auth status --hostname github.com
  register: gh_auth_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Fail loudly if gh auth still broken after configuration
  ansible.builtin.fail:
    msg: |
      gh auth status failed for github.com after running `gh auth login`.
      Most likely cause: the GH_TOKEN in vars/secrets.yml has expired or been revoked.
      Rotate it at https://github.com/settings/tokens, then:
        ansible-vault edit vars/secrets.yml   # update GH_TOKEN
        make run-role ROLE=apps
  when: gh_auth_check.rc != 0

- name: Ensure diffnav config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/diffnav"
    state: directory
    mode: "0755"

- name: Symlink diffnav config
  ansible.builtin.file:
    src: "{{ role_path }}/files/diffnav/config.yml"
    dest: "{{ HOME }}/.config/diffnav/config.yml"
    state: link
    force: true

- name: Ensure pgcli config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/pgcli"
    state: directory
    mode: "0755"

- name: Symlink pgcli config
  ansible.builtin.file:
    src: "{{ role_path }}/files/pgcli/config"
    dest: "{{ HOME }}/.config/pgcli/config"
    state: link
    force: true
