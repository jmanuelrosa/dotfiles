# Ansible role to install and configure all development apps
# Author: Jose Manuel Rosa <jmanuelrosa@duck.com> (https://jmanuelrosa.dev)
---

- name: Symlink git config and ignore
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/{{ item }}"
    state: link
    force: true
  with_items:
    - .gitconfig
    - .gitignore

- name: Symlink lazygit config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ HOME }}/Library/Application Support/{{ item }}"
    state: link
    force: true
  with_items:
    - lazygit/config.yml

- name: Symlink npmrc
  ansible.builtin.file:
    src: "{{ role_path }}/files/.npmrc"
    dest: "{{ HOME }}/.npmrc"
    state: link
    force: true

- name: Symlink gh (GitHub CLI) config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gh/config.yml"
    dest: "{{ HOME }}/.config/gh/config.yml"
    state: link
    force: true

- name: Verify gh is authenticated for github.com
  ansible.builtin.command: gh auth status --hostname github.com
  environment:
    GH_TOKEN: ""
    GITHUB_TOKEN: ""
  register: gh_auth_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Fail loudly if gh is not authenticated
  ansible.builtin.fail:
    msg: |
      gh is not authenticated for github.com.

      From a normal terminal (outside this playbook), run:
        gh auth login --hostname github.com --git-protocol ssh

      Pick "Login with a web browser" and follow the prompts. The OAuth
      token is stored only in the macOS keychain — this repo no longer
      keeps any GitHub credential on disk.

      Then re-run the playbook.
  when: gh_auth_check.rc != 0

- name: Install gh-dash (PR/issue dashboard) gh extension
  ansible.builtin.command: gh extension install dlvhdr/gh-dash
  args:
    creates: "{{ HOME }}/.local/share/gh/extensions/gh-dash"

- name: Ensure gh-dash config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/gh-dash"
    state: directory
    mode: "0755"

- name: Symlink gh-dash config
  ansible.builtin.file:
    src: "{{ role_path }}/files/gh-dash/config.yml"
    dest: "{{ HOME }}/.config/gh-dash/config.yml"
    state: link
    force: true

- name: Ensure diffnav config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/diffnav"
    state: directory
    mode: "0755"

- name: Symlink diffnav config
  ansible.builtin.file:
    src: "{{ role_path }}/files/diffnav/config.yml"
    dest: "{{ HOME }}/.config/diffnav/config.yml"
    state: link
    force: true

- name: Ensure pgcli config directory exists
  ansible.builtin.file:
    path: "{{ HOME }}/.config/pgcli"
    state: directory
    mode: "0755"

- name: Symlink pgcli config
  ansible.builtin.file:
    src: "{{ role_path }}/files/pgcli/config"
    dest: "{{ HOME }}/.config/pgcli/config"
    state: link
    force: true
