[defaults]
# (path) File to which Ansible will log on the controller. When empty logging is disabled.
log_path = ./ansible.log
display_skipped_hosts = False
# Long-running tasks (brew update, brew bundle) can outlast the default 10s
# connection timeout when waiting for a sudo password re-prompt.
timeout = 60

[privilege_escalation]
# How long Ansible waits to see either the sudo prompt or success indicator.
# Default is 10s. Bumping it gives macOS sudo (whose timestamp expires every
# 5 min) room to re-prompt mid-run without aborting the play.
become_timeout = 60
